replicaCount: 2

image:
  repository: ghcr.io/stefanprodan/podinfo
  tag: "6.11.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9898

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /healthz
    port: 9898
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: 9898
  initialDelaySeconds: 3
  periodSeconds: 10

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
