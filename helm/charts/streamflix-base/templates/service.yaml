apiVersion: v1
kind: Service
metadata:
  name: {{ include "streamflix-base.name" . }}
  labels:
    {{- include "streamflix-base.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "streamflix-base.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      name: http
