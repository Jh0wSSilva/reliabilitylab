# ConfigMap para dashboard Grafana (carregado automaticamente pelo sidecar)
apiVersion: v1
kind: ConfigMap
metadata:
  name: site-kubectl-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "true"
data:
  site-kubectl-overview.json: |
    {
      "uid": "site-kubectl-overview",
      "title": "Site Kubectl — Visão Geral",
      "tags": ["reliabilitylab", "site-kubectl"],
      "panels": [
        {
          "title": "Pods Disponíveis",
          "type": "stat",
          "datasource": "Prometheus",
          "targets": [{"expr": "kube_deployment_status_replicas_available{namespace='reliabilitylab', deployment='site-kubectl'}"}],
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0}
        }
      ]
    }
