# Valores para instalação do Promtail via Helm
# Promtail coleta logs dos pods e envia para o Loki
#
# Instalação:
#   helm upgrade --install promtail grafana/promtail \
#     -n monitoring --create-namespace \
#     -f observability/loki/promtail-values.yaml

config:
  clients:
  - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  snippets:
    pipelineStages:
    - cri: {}
    - json:
        expressions:
          level: level
          msg: message
    - labels:
        level:


resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
