apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-latency-recommendation-api
  namespace: chaos-mesh
spec:
  action: delay
  mode: all
  selector:
    namespaces:
    - production
    labelSelectors:
      app: recommendation-api
  delay:
    latency: "200ms"
    correlation: "100"
    jitter: "0ms"
  duration: "60s"
