# HorizontalPodAutoscaler — escala horizontal automática
# Escala de 2 a 6 réplicas baseado no uso de CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: site-kubectl
  namespace: reliabilitylab
  labels:
    app.kubernetes.io/name: site-kubectl
    app.kubernetes.io/part-of: reliabilitylab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: site-kubectl
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
