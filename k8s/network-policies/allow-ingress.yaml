# Allow external ingress traffic to StreamFlix APIs
#
# Tráfego externo (via ingress controller ou port-forward)
# só pode alcançar os pods das APIs StreamFlix na porta 9898.
# Isso garante que outros pods no namespace (jobs, sidecars)
# não são acessíveis externamente.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress
  namespace: production
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - content-api
      - recommendation-api
      - player-api
  policyTypes:
  - Ingress
  ingress:
  # Permite tráfego do ingress controller (namespace: ingress-nginx)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 9898
  # Permite port-forward local (tráfego do nó / kubectl proxy)
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 9898
