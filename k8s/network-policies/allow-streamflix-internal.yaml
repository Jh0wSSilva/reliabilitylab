# Allow internal communication between StreamFlix services
#
# Os 3 serviços (content-api, recommendation-api, player-api) podem
# se comunicar entre si via porta 9898. Isso simula uma service mesh
# básica onde apenas serviços conhecidos falam entre si.
#
# Também permite DNS (porta 53 UDP/TCP para kube-dns) — necessário
# para resolução de nomes de serviço.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-streamflix-internal
  namespace: production
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - content-api
      - recommendation-api
      - player-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Aceita tráfego de qualquer pod StreamFlix no namespace production
  - from:
    - podSelector:
        matchExpressions:
        - key: app
          operator: In
          values:
          - content-api
          - recommendation-api
          - player-api
    ports:
    - protocol: TCP
      port: 9898
  egress:
  # Permite comunicação entre os serviços StreamFlix
  - to:
    - podSelector:
        matchExpressions:
        - key: app
          operator: In
          values:
          - content-api
          - recommendation-api
          - player-api
    ports:
    - protocol: TCP
      port: 9898
  # Permite DNS (necessário para resolução de service names)
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
