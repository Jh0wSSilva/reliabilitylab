# Default deny all traffic in production namespace
#
# Segurança zero-trust: nenhum pod aceita tráfego por padrão.
# Cada serviço precisa de uma NetworkPolicy explícita para receber tráfego.
# Isso evita comunicação não intencional entre pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: production
spec:
  podSelector: {} # Aplica a todos os pods no namespace
  policyTypes:
  - Ingress # Bloqueia todo tráfego de entrada
  - Egress # Bloqueia todo tráfego de saída
