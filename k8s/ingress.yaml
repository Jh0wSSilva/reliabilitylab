# Ingress — expõe a aplicação via NGINX Ingress Controller
# Host local: site-kubectl.local (adicione no /etc/hosts)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site-kubectl
  namespace: reliabilitylab
  labels:
    app.kubernetes.io/name: site-kubectl
    app.kubernetes.io/part-of: reliabilitylab
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
  - host: site-kubectl.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: site-kubectl
            port:
              number: 80
