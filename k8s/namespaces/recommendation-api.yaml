apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-api
  namespace: production
  labels:
    app: recommendation-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recommendation-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: recommendation-api
    spec:
      containers:
      - name: recommendation-api
        image: ghcr.io/stefanprodan/podinfo:6.11.0
        ports:
        - containerPort: 9898
          name: http
        env:
        - name: PODINFO_UI_COLOR
          value: "#347c5a"
        - name: PODINFO_UI_MESSAGE
          value: "recommendation-api (StreamFlix)"
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9898
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9898
          initialDelaySeconds: 3
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-api
  namespace: production
spec:
  selector:
    app: recommendation-api
  ports:
  - port: 9898
    targetPort: 9898
    name: http
