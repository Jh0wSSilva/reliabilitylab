# =============================================================================
# Segurança — Boas Práticas para Secrets
#
# Este arquivo documenta como gerenciar secrets de forma segura no Kubernetes.
# Em ambiente de produção, use ferramentas como:
#   - Sealed Secrets (Bitnami)
#   - External Secrets Operator
#   - HashiCorp Vault
#
# Para o laboratório local, usamos stringData para facilitar o aprendizado.
# =============================================================================

# --- Secret da aplicação (exemplo educacional) ---
apiVersion: v1
kind: Secret
metadata:
  name: site-kubectl-secret
  namespace: reliabilitylab
  labels:
    app.kubernetes.io/name: site-kubectl
    app.kubernetes.io/part-of: reliabilitylab
    app.kubernetes.io/component: secret
  annotations:
    # Indicar que este secret não deve ser sincronizado pelo ArgoCD
    # (em produção, secrets devem vir de um vault externo)
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
stringData:
  # Placeholder — a aplicação current não exige segredos obrigatórios
  # Formato: chave=valor em texto plano (Kubernetes codifica em base64 automaticamente)
  APP_SECRET_KEY: "altere-este-valor-em-ambientes-reais"

# --- Documentação de boas práticas ---
#
# 1. NUNCA comite secrets reais no Git
#    - Use .gitignore para excluir arquivos com valores reais
#    - Use sealed-secrets para encriptar antes de comitar
#
# 2. Rotação de secrets:
#    kubectl create secret generic site-kubectl-secret \
#      --from-literal=APP_SECRET_KEY="novo-valor-seguro" \
#      --dry-run=client -o yaml | kubectl apply -f -
#
# 3. Em produção real, use External Secrets:
#    apiVersion: external-secrets.io/v1beta1
#    kind: ExternalSecret
#    metadata:
#      name: site-kubectl-secret
#    spec:
#      refreshInterval: 1h
#      secretStoreRef:
#        kind: ClusterSecretStore
#        name: vault-backend
#      target:
#        name: site-kubectl-secret
#      data:
#      - secretKey: APP_SECRET_KEY
#        remoteRef:
#          key: secret/data/reliabilitylab
#          property: app_secret_key
