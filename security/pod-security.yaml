# =============================================================================
# Segurança — Pod Security Standards
# Aplica restrições de segurança ao namespace usando labels padrão do Kubernetes
#
# Pod Security Standards (PSS) substituem o PodSecurityPolicy (PSP) e têm 3 níveis:
#   - privileged: sem restrições
#   - baseline: restrições mínimas (bloqueia escaladas de privilégio básicas)
#   - restricted: restrições máximas (padrão de segurança recomendado)
#
# Este manifest atualiza o namespace para enforcar o nível "restricted"
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: reliabilitylab
  labels:
    app.kubernetes.io/part-of: reliabilitylab
    purpose: devops-lab
    # Pod Security Admission — nível restricted
    # enforce: rejeita pods que não cumprem
    # warn: emite warning mas permite
    # audit: registra em log de auditoria
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
